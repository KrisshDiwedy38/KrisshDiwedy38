        <text x="0" y="112" xml:space="preserve">D*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0Q</text>
        <text x="0" y="126" xml:space="preserve">0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O</text>
        <text x="0" y="140" xml:space="preserve">+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*</text>
        <text x="0" y="154" xml:space="preserve">QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0</text>
