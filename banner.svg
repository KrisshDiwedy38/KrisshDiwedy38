<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <!-- Responsive styles for light and dark modes -->
    <style>
      .bg-rect {
        transition: fill 0.3s ease;
      }
      .pat-light-g { fill: #888888; }
      .pat-medium-g { fill: #444444; }
      .pat-heavy-g { fill: #050505; }
      
      .glow-start { stop-color: #f7f9fc; }
      .glow-end { stop-color: #ffffff; }

      .subtitle-text {
        fill: #475569;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 8px;
        transition: fill 0.3s ease;
      }

      /* Dark mode overrides (automatically matches GitHub's theme) */
      @media (prefers-color-scheme: dark) {
        .glow-start { stop-color: #1b1530; } /* Subtle indigo/violet glow */
        .glow-end { stop-color: #0d1117; }   /* GitHub Dark Mode background */
        
        .pat-light-g { fill: #555555; }
        .pat-medium-g { fill: #94a3b8; }
        .pat-heavy-g { fill: #f8fafc; }
        
        .subtitle-text {
          fill: #94a3b8;
        }
      }

      /* Subtle entry animation */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .main-content {
        animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
    </style>

    <!-- Radial gradient for responsive background glow -->
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" class="glow-start" />
      <stop offset="100%" class="glow-end" />
    </radialGradient>

    <!-- Text Template (the silhouette used to clip the pattern layers) -->
    <!-- EDIT YOUR TEXT HERE: Change 'KRISSH' to your name or username -->
    <g id="txt">
      <text x="500" y="165" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="105" text-anchor="middle" letter-spacing="12">KRISSH DIWEDY</text>
    </g>

    <!-- Patterns containing character grids -->
    <pattern id="pat-light" width="400" height="200" patternUnits="userSpaceOnUse">
      <g class="pat-light-g" font-family="monospace" font-size="16" fill="#888" letter-spacing="5">
        <text x="0" y="20" xml:space="preserve">. - : . . - : - . : . . - : - . : . . - : - . : . . - : - . : . . - : - . : .</text>
        <text x="0" y="40" xml:space="preserve">: . - - : . : - . . : - : . - - : . : . - - : . : - . . : - : . - - : . : . -</text>
        <text x="0" y="60" xml:space="preserve">- : . : . - - : . : - . . : - : . - - : . : . - - : . : - . . : - : . - - : .</text>
        <text x="0" y="80" xml:space="preserve">. . - : - . : . . - : - . : . . - : - . : . . - : - . : . . - : - . : . . - :</text>
        <text x="0" y="100" xml:space="preserve">: - . . : - : . - - : . : . - - : . : - . . : - : . - - : . : . - - : . : - .</text>
        <text x="0" y="120" xml:space="preserve">. - : . . - : - . : . . - : - . : . . - : - . : . . - : - . : . . - : - . : .</text>
        <text x="0" y="140" xml:space="preserve">- : . : . - - : . : - . . : - : . - - : . : . - - : . : - . . : - : . - - : .</text>
        <text x="0" y="160" xml:space="preserve">: . - - : . : - . . : - : . - - : . : . - - : . : - . . : - : . - - : . : . -</text>
        <text x="0" y="180" xml:space="preserve">. . - : - . : . . - : - . : . . - : - . : . . - : - . : . . - : - . : . . - :</text>
        <text x="0" y="200" xml:space="preserve">- : . : . - - : . : - . . : - : . - - : . : . - - : . : - . . : - : . - - : .</text>
      </g>
    </pattern>

    <pattern id="pat-medium" width="400" height="200" patternUnits="userSpaceOnUse">
      <g class="pat-medium-g" font-family="monospace" font-size="14" fill="#444" letter-spacing="2">
        <text x="0" y="14" xml:space="preserve">O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=O0QD*+=</text>
