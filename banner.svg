  <!-- Background Rect with responsive glow -->
  <rect class="bg-rect" width="100%" height="100%" fill="url(#bg-glow)" />

  <!-- The main visual layers containing ASCII halftones and typography -->
  <g class="main-content">
    <!-- 1. Light dot-density outer halo -->
    <rect width="100%" height="100%" fill="url(#pat-light)" mask="url(#mask-light)" />

    <!-- 2. Medium letter-density mid halo -->
    <rect width="100%" height="100%" fill="url(#pat-medium)" mask="url(#mask-medium)" />

    <!-- 3. Heavy dense-character inner text shadow/shading -->
    <rect width="100%" height="100%" fill="url(#pat-heavy)" mask="url(#mask-heavy)" />

    <!-- 4. Sharp overlay to keep the center of text perfectly crisp -->
    <rect width="100%" height="100%" fill="url(#pat-heavy)" mask="url(#mask-sharp)" />

    <!-- Subtitle text centered below the main ASCII text -->
    <text class="subtitle-text" x="500" y="235" text-anchor="middle">CREATIVE DEVELOPER</text>
  </g>
</svg>